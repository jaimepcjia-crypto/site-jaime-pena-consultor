<!doctype html>
<html>
<head><title>Forms (Netlify detection)</title></head>
<body>
<!-- This page exists ONLY so Netlify's static HTML form parser can detect the form
     during deploy. Users never see it. -->
<form name="contato" data-netlify="true" netlify-honeypot="bot-field" hidden>
  <input type="text" name="nome" />
  <input type="tel" name="telefone" />
  <input type="email" name="email" />
  <textarea name="mensagem"></textarea>
  <input type="text" name="empreendimento" />
  <input type="text" name="lang" />
  <input type="text" name="bot-field" />
</form>
</body>
</html>
